<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rectangle for inventory slot -->
  <rect width="64" height="64" fill="#f0f0f0" stroke="#000" stroke-width="1"/>
  
  <!-- Steel plate armor silhouette -->
  <!-- Helmet -->
  <ellipse cx="32" cy="12" rx="12" ry="8" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="26" y="8" width="12" height="6" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  
  <!-- Chest plate -->
  <rect x="20" y="18" width="24" height="20" rx="4" ry="4" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="24" y="22" width="16" height="12" fill="#a0a0a0" stroke="#808080" stroke-width="1"/>
  
  <!-- Shoulder pauldrons -->
  <ellipse cx="16" cy="24" rx="6" ry="4" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <ellipse cx="48" cy="24" rx="6" ry="4" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  
  <!-- Gauntlets (hands) -->
  <rect x="12" y="32" width="8" height="6" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="44" y="32" width="8" height="6" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  
  <!-- Leg greaves -->
  <rect x="26" y="38" width="6" height="14" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="32" y="38" width="6" height="14" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  
  <!-- Boots -->
  <rect x="24" y="52" width="8" height="6" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="32" y="52" width="8" height="6" rx="2" ry="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  
  <!-- Armor details (rivets or seams) -->
  <circle cx="32" cy="28" r="1" fill="#404040"/>
  <circle cx="28" cy="32" r="1" fill="#404040"/>
  <circle cx="36" cy="32" r="1" fill="#404040"/>
  <circle cx="32" cy="40" r="1" fill="#404040"/>
</svg>